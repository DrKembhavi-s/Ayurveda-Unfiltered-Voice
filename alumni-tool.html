<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dr Kembhavi's Alumni Tool</title>
  <style>
    :root {
      --dark-blue:#1e3a8a; --light-blue:#3b82f6;
      --cream:#fef7ed; --white:#ffffff;
      --gray:#6b7280; --success:#10b981; --error:#ef4444;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,var(--cream) 0%,#e0f2fe 100%);min-height:100vh;color:var(--dark-blue)}
    .container{max-width:860px;margin:0 auto;padding:20px}
    .header{text-align:center;background:var(--white);padding:30px;border-radius:15px;box-shadow:0 4px 20px rgba(30,58,138,.1);margin-bottom:24px}
    .header h1{color:var(--dark-blue);font-size:2.2rem;margin-bottom:6px;font-weight:700}
    .header p{color:var(--gray);font-size:1rem}
    .fb-status{display:inline-block;margin-top:10px;padding:5px 14px;border-radius:20px;font-size:.85rem;font-weight:600}
    .fb-ok{background:#d1fae5;color:var(--success)}
    .fb-err{background:#fee2e2;color:var(--error)}
    .nav-buttons{display:flex;justify-content:center;gap:16px;margin-bottom:24px;flex-wrap:wrap}
    .nav-btn{background:var(--light-blue);color:#fff;border:none;padding:11px 28px;border-radius:8px;cursor:pointer;font-size:.95rem;font-weight:600;transition:all .25s}
    .nav-btn:hover,.nav-btn.active{background:var(--dark-blue);transform:translateY(-2px)}
    .card{background:var(--white);padding:36px;border-radius:15px;box-shadow:0 4px 20px rgba(30,58,138,.1)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .form-row.single{grid-template-columns:1fr}
    .form-group{margin-bottom:20px}
    label{display:block;margin-bottom:6px;color:var(--dark-blue);font-weight:600;font-size:.93rem}
    input,select,textarea{width:100%;padding:11px;border:2px solid #e5e7eb;border-radius:8px;font-size:.95rem;transition:border-color .25s;font-family:inherit}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--light-blue)}
    textarea{resize:vertical;min-height:80px}
    .checkbox-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .checkbox-row input[type=checkbox]{width:auto}
    .pg-details{background:var(--cream);padding:18px;border-radius:8px;margin-top:10px;display:none}
    .btn-submit{background:var(--success);color:#fff;border:none;padding:14px;border-radius:8px;cursor:pointer;font-size:1.05rem;font-weight:600;width:100%;transition:all .25s}
    .btn-submit:hover:not(:disabled){background:#059669;transform:translateY(-2px)}
    .btn-submit:disabled{opacity:.6;cursor:not-allowed}
    .alert{padding:13px;border-radius:8px;margin-bottom:18px;font-weight:600;display:none}
    .alert.success{background:#d1fae5;color:var(--success);border:1px solid var(--success)}
    .alert.error{background:#fee2e2;color:var(--error);border:1px solid var(--error)}
    .admin-login{max-width:380px;margin:0 auto}
    .panel-section{background:var(--cream);padding:22px;border-radius:10px;margin-bottom:22px}
    .panel-section h3{margin-bottom:16px;color:var(--dark-blue)}
    .dl-btn{background:var(--dark-blue);color:#fff;border:none;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;margin:4px;transition:all .25s}
    .dl-btn:hover{background:var(--light-blue)}
    .student-list{max-height:420px;overflow-y:auto;border:1px solid #e5e7eb;border-radius:8px}
    .student-item{padding:14px;border-bottom:1px solid #e5e7eb;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:12px;align-items:center}
    .student-item:last-child{border-bottom:none}
    .s-name{font-weight:600;color:var(--dark-blue)}
    .s-info{color:var(--gray);font-size:.88rem}
    .hidden{display:none!important}
    .spinner{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .badge{display:inline-block;background:var(--light-blue);color:#fff;border-radius:12px;padding:2px 10px;font-size:.82rem;font-weight:600;margin-left:6px}
    @media(max-width:600px){.form-row{grid-template-columns:1fr}.student-item{grid-template-columns:1fr;text-align:center}.header h1{font-size:1.7rem}}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎓 Dr Kembhavi's Alumni Tool</h1>
    <p>Jain AGM Ayurvedic Medical College &amp; Hospital — Alumni Registration &amp; Management</p>
    <span id="fbStatus" class="fb-status fb-err">⏳ Connecting to database…</span>
  </div>

  <div class="nav-buttons">
    <button class="nav-btn active" id="btnStudent" onclick="showSection('student')">Student Registration</button>
    <button class="nav-btn" id="btnAdmin" onclick="showSection('admin')">Admin Access</button>
  </div>

  <!-- STUDENT SECTION -->
  <div id="student-section" class="card">
    <h2 style="margin-bottom:24px;text-align:center;color:var(--dark-blue)">Alumni Registration Form</h2>
    <div id="studentAlert" class="alert"></div>
    <form id="studentForm" autocomplete="off">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="fullName" required placeholder="As on degree certificate">
        </div>
        <div class="form-group">
          <label>Registration Number *</label>
          <input type="text" id="regNo" required placeholder="University reg. number">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Admission Batch *</label>
          <select id="admissionBatch" required>
            <option value="">Select Batch</option>
            <option>2017-18</option><option>2018-19</option><option>2019-20</option>
            <option>2020-21</option><option>2021-22</option><option>2022-23</option>
            <option>2023-24</option><option>2024-25</option>
          </select>
        </div>
        <div class="form-group">
          <label>WhatsApp Number *</label>
          <input type="tel" id="whatsappNumber" required placeholder="+91 XXXXX XXXXX">
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" id="email" required>
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label>Full Address *</label>
          <textarea id="address" required placeholder="House/flat, street, city, state, PIN code"></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Current Occupation *</label>
          <select id="occupation" required>
            <option value="">Select</option>
            <option>Private Practice</option><option>Hospital Employee</option>
            <option>Government Service</option><option>Teaching</option>
            <option>Further Studies</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Marital Status *</label>
          <select id="maritalStatus" required>
            <option value="">Select</option>
            <option>Single</option><option>Married</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <div class="checkbox-row">
          <input type="checkbox" id="pgEnrolled" onchange="togglePG()">
          <label for="pgEnrolled" style="margin-bottom:0">Currently enrolled in Post-Graduate studies</label>
        </div>
        <div id="pgDetails" class="pg-details">
          <div class="form-row">
            <div class="form-group" style="margin-bottom:0">
              <label>PG College Name</label>
              <input type="text" id="pgCollege" placeholder="College name">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label>Department / Speciality</label>
              <input type="text" id="pgDepartment" placeholder="e.g. Kayachikitsa">
            </div>
          </div>
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label>Board Registration Number</label>
          <input type="text" id="boardRegNo" placeholder="KMC / State council reg. (if applicable)">
        </div>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Register as Alumni</button>
    </form>
  </div>

  <!-- ADMIN SECTION -->
  <div id="admin-section" class="card hidden">
    <!-- Login -->
    <div id="adminLogin" class="admin-login">
      <h2 style="margin-bottom:24px;text-align:center;color:var(--dark-blue)">Admin Login</h2>
      <div id="adminAlert" class="alert"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="adminUser" placeholder="admin">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="adminPass" placeholder="••••••••••">
      </div>
      <button class="btn-submit" onclick="adminLogin()">Login</button>
    </div>

    <!-- Dashboard -->
    <div id="adminDash" class="hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:10px">
        <h2 style="color:var(--dark-blue)">Admin Dashboard</h2>
        <button class="dl-btn" style="background:var(--error)" onclick="adminLogout()">Logout</button>
      </div>

      <div class="panel-section">
        <h3>Download Reports</h3>
        <button class="dl-btn" onclick="downloadAll()">⬇ Download All</button>
        <button class="dl-btn" onclick="toggleBatchPanel()">📂 Download by Batch</button>
        <div id="batchPanel" class="hidden" style="margin-top:14px">
          <p style="margin-bottom:8px;font-size:.9rem;color:var(--gray)">Select a batch:</p>
          <div id="batchBtns"></div>
        </div>
      </div>

      <div class="panel-section">
        <h3>Registered Alumni <span class="badge" id="alumniCount">0</span></h3>
        <div id="refreshRow" style="margin-bottom:12px">
          <button class="dl-btn" onclick="loadAlumni()">🔄 Refresh</button>
        </div>
        <div id="alumniList" class="student-list">
          <p style="padding:20px;text-align:center;color:var(--gray)">Loading…</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  // ──────────────────────────────────────────────────
  // 🔧 PASTE YOUR FIREBASE CONFIG HERE
  // ──────────────────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyDqNQne9mqtSSJdMGZxv-4y-tMGRehs02g",
    authDomain:        "ayurveda-unfiltered-voice.firebaseapp.com",
    projectId:         "ayurveda-unfiltered-voice",
    storageBucket:     "ayurveda-unfiltered-voice.firebasestorage.app",
    messagingSenderId: "220882680704",
    appId:             "1:220882680704:web:dd866513680c256e101f65"
  };
  // ──────────────────────────────────────────────────

  const ADMIN_USER = 'admin';
  const ADMIN_PASS = 'kembhavi2024';
  const COLLECTION  = 'alumni_registrations';

  let db, allAlumni = [];

  try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    document.getElementById('fbStatus').textContent = '✅ Connected to database';
    document.getElementById('fbStatus').className = 'fb-status fb-ok';
  } catch(e) {
    document.getElementById('fbStatus').textContent = '❌ Database connection failed';
    console.error(e);
  }

  // ── Helpers ──────────────────────────────────────
  function showAlert(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = `alert ${type}`;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 6000);
  }

  // ── Expose globals ────────────────────────────────
  window.showSection = (sec) => {
    document.getElementById('student-section').classList.toggle('hidden', sec !== 'student');
    document.getElementById('admin-section').classList.toggle('hidden', sec !== 'admin');
    document.getElementById('btnStudent').classList.toggle('active', sec === 'student');
    document.getElementById('btnAdmin').classList.toggle('active', sec === 'admin');
  };

  window.togglePG = () => {
    const show = document.getElementById('pgEnrolled').checked;
    document.getElementById('pgDetails').style.display = show ? 'block' : 'none';
    if (!show) { document.getElementById('pgCollege').value = ''; document.getElementById('pgDepartment').value = ''; }
  };

  window.adminLogin = () => {
    const u = document.getElementById('adminUser').value.trim();
    const p = document.getElementById('adminPass').value;
    if (u === ADMIN_USER && p === ADMIN_PASS) {
      document.getElementById('adminLogin').classList.add('hidden');
      document.getElementById('adminDash').classList.remove('hidden');
      loadAlumni();
    } else {
      showAlert('adminAlert', '❌ Invalid credentials. Check username and password.', 'error');
    }
  };

  window.adminLogout = () => {
    document.getElementById('adminLogin').classList.remove('hidden');
    document.getElementById('adminDash').classList.add('hidden');
    document.getElementById('adminUser').value = '';
    document.getElementById('adminPass').value = '';
  };

  // ── Student registration ──────────────────────────
  document.getElementById('studentForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!db) { showAlert('studentAlert','❌ Database not connected. Please try later.','error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Registering…';

    const regNo = document.getElementById('regNo').value.trim();

    // Duplicate check
    try {
      const snap = await getDocs(query(collection(db, COLLECTION), where('regNo','==',regNo)));
      if (!snap.empty) {
        showAlert('studentAlert','⚠️ This Registration Number is already registered!','error');
        btn.disabled = false; btn.innerHTML = 'Register as Alumni'; return;
      }

      const data = {
        fullName:       document.getElementById('fullName').value.trim(),
        regNo,
        admissionBatch: document.getElementById('admissionBatch').value,
        whatsappNumber: document.getElementById('whatsappNumber').value.trim(),
        email:          document.getElementById('email').value.trim(),
        address:        document.getElementById('address').value.trim(),
        occupation:     document.getElementById('occupation').value,
        maritalStatus:  document.getElementById('maritalStatus').value,
        pgEnrolled:     document.getElementById('pgEnrolled').checked,
        pgCollege:      document.getElementById('pgCollege').value.trim(),
        pgDepartment:   document.getElementById('pgDepartment').value.trim(),
        boardRegNo:     document.getElementById('boardRegNo').value.trim(),
        registeredAt:   serverTimestamp()
      };

      await addDoc(collection(db, COLLECTION), data);
      showAlert('studentAlert','✅ Registration successful! Welcome to the alumni network.','success');
      document.getElementById('studentForm').reset();
      document.getElementById('pgDetails').style.display = 'none';
    } catch(err) {
      console.error(err);
      showAlert('studentAlert','❌ Registration failed: ' + err.message,'error');
    }
    btn.disabled = false; btn.innerHTML = 'Register as Alumni';
  });

  // ── Load alumni (admin) ───────────────────────────
  window.loadAlumni = async () => {
    if (!db) return;
    document.getElementById('alumniList').innerHTML =
      '<p style="padding:20px;text-align:center;color:var(--gray)">Loading…</p>';
    try {
      const snap = await getDocs(query(collection(db, COLLECTION), orderBy('registeredAt','desc')));
      allAlumni = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderAlumniList(allAlumni);
      buildBatchButtons();
    } catch(err) {
      document.getElementById('alumniList').innerHTML =
        `<p style="padding:20px;text-align:center;color:var(--error)">Error: ${err.message}</p>`;
    }
  };

  function renderAlumniList(list) {
    document.getElementById('alumniCount').textContent = list.length;
    const el = document.getElementById('alumniList');
    if (!list.length) { el.innerHTML = '<p style="padding:20px;text-align:center;color:var(--gray)">No registrations yet.</p>'; return; }
    el.innerHTML = list.map(s => `
      <div class="student-item">
        <div><div class="s-name">${s.fullName}</div><div class="s-info">Reg: ${s.regNo}</div></div>
        <div class="s-info">${s.admissionBatch}</div>
        <div class="s-info">${s.whatsappNumber}</div>
        <div class="s-info">${s.occupation}</div>
      </div>`).join('');
  }

  function buildBatchButtons() {
    const batches = [...new Set(allAlumni.map(s => s.admissionBatch))].sort();
    document.getElementById('batchBtns').innerHTML = batches.map(b => {
      const cnt = allAlumni.filter(s => s.admissionBatch === b).length;
      return `<button class="dl-btn" onclick="downloadBatch('${b}')">⬇ ${b} (${cnt})</button>`;
    }).join('');
  }

  window.toggleBatchPanel = () => {
    document.getElementById('batchPanel').classList.toggle('hidden');
  };

  // ── CSV helpers ───────────────────────────────────
  function toCSV(data) {
    const headers = ['Full Name','Reg No','Batch','WhatsApp','Email','Address',
      'Occupation','Marital Status','PG Enrolled','PG College','PG Dept','Board Reg No'];
    const rows = data.map(s => [
      s.fullName, s.regNo, s.admissionBatch, s.whatsappNumber, s.email,
      s.address?.replace(/\n/g,' '), s.occupation, s.maritalStatus,
      s.pgEnrolled ? 'Yes' : 'No', s.pgCollege||'', s.pgDepartment||'', s.boardRegNo||''
    ].map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(','));
    return [headers.join(','), ...rows].join('\n');
  }

  function triggerDownload(csv, filename) {
    const blob = new Blob([csv], { type:'text/csv' });
    const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: filename });
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  window.downloadAll = () => {
    if (!allAlumni.length) { alert('No alumni data loaded. Click Refresh first.'); return; }
    triggerDownload(toCSV(allAlumni), 'all_alumni.csv');
  };

  window.downloadBatch = (batch) => {
    const data = allAlumni.filter(s => s.admissionBatch === batch);
    triggerDownload(toCSV(data), `alumni_${batch.replace('-','_')}.csv`);
  };
</script>
</body>
</html>
